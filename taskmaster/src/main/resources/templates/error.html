<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - TaskMaster</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

    <!-- Include Navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container my-auto">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="error-container py-5">
                    <!-- Error Code -->
                    <div class="error-code mb-2" th:text="${errorCode}">500</div>
                    
                    <!-- Error Heading -->
                    <h2 class="fw-bold mb-3">Oops! Something went wrong</h2>
                    
                    <!-- Error Message Description -->
                    <p class="error-message mb-4" th:text="${errorMessage}">An unexpected error occurred. Please try again later.</p>
                    
                    <!-- Actions -->
                    <div class="d-flex justify-content-center gap-3">
                        <a href="/dashboard" class="btn btn-primary px-4 py-2">
                            <i class="bi bi-house-door-fill me-1"></i> Go to Dashboard
                        </a>
                        <button onclick="history.back()" class="btn btn-outline-secondary px-4 py-2">
                            <i class="bi bi-arrow-left me-1"></i> Go Back
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Include Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
