<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TaskMaster</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light">

    <main class="container d-flex flex-column align-items-center justify-content-center min-vh-100 py-5">
        <div class="row w-100 justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <!-- Logo Header -->
                <div class="text-center mb-4">
                    <h1 class="display-6 fw-extrabold text-dark mb-1" style="font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800;">
                        Task<span class="text-primary">Master</span>
                    </h1>
                    <p class="text-muted">Sign in to manage your projects and tasks.</p>
                </div>

                <!-- Login Card -->
                <div class="card border-0 shadow-lg p-4" style="border-radius: 16px; background-color: #ffffff;">
                    
                    <!-- Success Alert -->
                    <div th:if="${successMessage != null}" class="alert alert-success d-flex align-items-center gap-2 mb-4" role="alert">
                        <i class="bi bi-check-circle-fill"></i>
                        <span th:text="${successMessage}">Registration successful! Please sign in.</span>
                    </div>
                    
                    <!-- Error Alert -->
                    <div th:if="${error != null}" class="alert alert-danger d-flex align-items-center gap-2 mb-4" role="alert">
                        <i class="bi bi-exclamation-circle-fill"></i>
                        <span th:text="${error}">Invalid username or password.</span>
                    </div>

                    <!-- Login Form -->
                    <form th:action="@{/login}" method="post">
                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                                <input type="text" id="username" name="username" th:value="${username}" 
                                       class="form-control border-start-0 ps-0 bg-light" 
                                       placeholder="Enter your username" required autocomplete="off">
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                                <input type="password" id="password" name="password" 
                                       class="form-control border-start-0 ps-0 bg-light" 
                                       placeholder="Enter your password" required>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary w-100 py-3 fw-semibold mb-3" style="border-radius: 10px;">
                            Sign In
                        </button>
                    </form>

                    <!-- Toggle to Register -->
                    <div class="border-top pt-3 text-center">
                        <small class="text-muted">
                            Don't have an account? <a href="/register" class="text-primary fw-semibold">Sign Up</a>
                        </small>
                    </div>
                </div>

                <!-- Footer copy -->
                <div class="text-center mt-4">
                    <small class="text-muted">&copy; 2026 TaskMaster System</small>
                </div>

            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
