<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TaskMaster</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

    <!-- Include Navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container my-5">
        <!-- Page Header -->
        <div class="row mb-4">
            <div class="col">
                <h1 class="page-title">Dashboard</h1>
                <p class="text-muted">Welcome to TaskMaster! Here is your project and task overview.</p>
            </div>
        </div>

        <!-- Statistics Cards -->
        <div class="row g-4 mb-5">
            <!-- Total Projects (Blue Card) -->
            <div class="col-md-6 col-lg-3 stat-card-wrapper">
                <div class="card stat-card stat-card-blue p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase text-white-50 mb-2">Total Projects</h6>
                            <h2 class="display-5 fw-bold mb-0" th:text="${totalProjects}">0</h2>
                        </div>
                        <div class="fs-1 text-white-50">
                            <i class="bi bi-briefcase"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Total Tasks (Green Card) -->
            <div class="col-md-6 col-lg-3 stat-card-wrapper">
                <div class="card stat-card stat-card-green p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase text-white-50 mb-2">Total Tasks</h6>
                            <h2 class="display-5 fw-bold mb-0" th:text="${totalTasks}">0</h2>
                        </div>
                        <div class="fs-1 text-white-50">
                            <i class="bi bi-list-task"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Completed Tasks (Yellow Card) -->
            <div class="col-md-6 col-lg-3 stat-card-wrapper">
                <div class="card stat-card stat-card-yellow p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase text-white-50 mb-2">Completed Tasks</h6>
                            <h2 class="display-5 fw-bold mb-0" th:text="${completedTasks}">0</h2>
                        </div>
                        <div class="fs-1 text-white-50">
                            <i class="bi bi-check-circle"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pending Tasks (Red Card) -->
            <div class="col-md-6 col-lg-3 stat-card-wrapper">
                <div class="card stat-card stat-card-red p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase text-white-50 mb-2">Pending Tasks</h6>
                            <h2 class="display-5 fw-bold mb-0" th:text="${pendingTasks}">0</h2>
                        </div>
                        <div class="fs-1 text-white-50">
                            <i class="bi bi-clock-history"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Actions Panel -->
        <div class="row">
            <div class="col-md-12">
                <div class="content-card">
                    <h4 class="mb-4 fw-bold">Quick Actions</h4>
                    <div class="row g-3">
                        <div class="col-sm-6 col-lg-3">
                            <a href="/projects/add" class="btn btn-primary w-100 py-3 d-flex flex-column align-items-center justify-content-center gap-2">
                                <i class="bi bi-folder-plus fs-3"></i>
                                <span>Add Project</span>
                            </a>
                        </div>
                        <div class="col-sm-6 col-lg-3">
                            <a href="/projects" class="btn btn-outline-dark w-100 py-3 d-flex flex-column align-items-center justify-content-center gap-2">
                                <i class="bi bi-folder2-open fs-3"></i>
                                <span>View Projects</span>
                            </a>
                        </div>
                        <div class="col-sm-6 col-lg-3">
                            <a href="/tasks/add" class="btn btn-success w-100 py-3 d-flex flex-column align-items-center justify-content-center gap-2">
                                <i class="bi bi-plus-circle fs-3"></i>
                                <span>Add Task</span>
                            </a>
                        </div>
                        <div class="col-sm-6 col-lg-3">
                            <a href="/tasks" class="btn btn-outline-dark w-100 py-3 d-flex flex-column align-items-center justify-content-center gap-2">
                                <i class="bi bi-card-checklist fs-3"></i>
                                <span>View Tasks</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Include Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
