<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Project - TaskMaster</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

    <!-- Include Navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- Page Title -->
                <div class="mb-4">
                    <a href="/projects" class="btn btn-sm btn-outline-secondary mb-3">
                        <i class="bi bi-arrow-left"></i> Back to Projects
                    </a>
                    <h1 class="page-title">Add Project</h1>
                    <p class="text-muted">Fill in the fields below to create a new project.</p>
                </div>

                <!-- Form Card -->
                <div class="content-card">
                    <form th:action="@{/projects/add}" th:object="${project}" method="post">
                        <!-- Project Name -->
                        <div class="mb-3">
                            <label for="projectName" class="form-label">Project Name <span class="text-danger">*</span></label>
                            <input type="text" id="projectName" th:field="*{projectName}" 
                                   class="form-control" th:classappend="${#fields.hasErrors('projectName')} ? 'is-invalid' : ''"
                                   placeholder="Enter project name">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('projectName')}" th:errors="*{projectName}">
                                Project name is required.
                            </div>
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea id="description" th:field="*{description}" rows="4" 
                                      class="form-control" placeholder="Enter project description..."></textarea>
                        </div>

                        <!-- Start and End Dates -->
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label for="startDate" class="form-label">Start Date</label>
                                <input type="date" id="startDate" th:field="*{startDate}" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label for="endDate" class="form-label">End Date</label>
                                <input type="date" id="endDate" th:field="*{endDate}" class="form-control">
                            </div>
                        </div>

                        <!-- Status Selection -->
                        <div class="mb-4">
                            <label for="status" class="form-label">Status</label>
                            <select id="status" th:field="*{status}" class="form-select">
                                <option value="Not Started">Not Started</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>

                        <!-- Form Actions -->
                        <div class="d-flex justify-content-end gap-2 border-top pt-3">
                            <a href="/projects" class="btn btn-outline-secondary px-4 py-2">Cancel</a>
                            <button type="submit" class="btn btn-primary px-4 py-2">Save Project</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Include Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
